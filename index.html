<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

.screen{
  display:none;
  width:100vw;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.show{display:flex;}

input{
  padding:14px;
  width:70%;
  border:none;
  border-radius:15px;
}

button{
  padding:14px 26px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff4d6d,#6cf);
  color:white;
  margin-top:10px;
}

/* PHOTO */
#photo{
  width:70vw;
  height:70vw;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 20px pink;
}

/* TEXT */
#wish{
  font-size:4vw;
  line-height:1.6;
}

/* COUNT */
#count{
  font-size:22vw;
}

/* PROPOSAL */
#proposal{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  overflow:hidden;
}

#proposalImg{
  width:90%;
  max-height:90%;
  opacity:0;
  transform:translateY(120px) scale(0.7);
  transition:all 2s ease;
}

/* YES BUTTON ESCAPE */
#yesBtn{
  position:relative;
  padding:14px 26px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#ff4d6d,#6cf);
  color:white;
}

@keyframes roam {
  0% {transform:translate(0,0);}
  25% {transform:translate(80px,-30px);}
  50% {transform:translate(-70px,40px);}
  75% {transform:translate(60px,60px);}
  100% {transform:translate(0,0);}
}

.roaming{
  animation: roam 0.3s infinite linear;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen show">
  <div>
    <h2>🔐 Enter Password</h2>
    <input id="pass">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- BIRTHDAY -->
<div id="main" class="screen">
  <div>
    <h2>Happy Birthday Samiksha 💖</h2>
    <img id="photo" src="photo1.jpg">
    <p id="wish"></p>
    <button onclick="start()">Tap for Surprise 💖</button>
  </div>
</div>

<!-- COUNT -->
<div id="countScreen" class="screen">
  <h1 id="count">5</h1>
</div>

<!-- READY -->
<div id="readyScreen" class="screen">
  <h2>Are you ready? 💖</h2>
  <button id="yesBtn" onclick="goNext()">Yes 💕</button>
</div>

<!-- WAIT -->
<div id="waitScreen" class="screen">
  <h2>💌 Special message coming...</h2>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen">
  <img id="proposalImg" src="proposal-card.jpg">
</div>

<audio id="boom" src="boom.mp3"></audio>
<audio id="music" src="makhamali.mp3"></audio>

<script>

let boom=document.getElementById("boom");
let music=document.getElementById("music");

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
  document.getElementById(id).classList.add("show");
}

/* PASSWORD */
function unlock(){
  let val=document.getElementById("pass").value.trim().toLowerCase();

  if(val==="angry bird"){
    boom.play();
    show("main");
    typeText();
  }
}

/* TEXT */
let text=`Wishing you a very happy birthday 🎂💗
You are my special Angry Bird 🐦❤️`;

let i=0;

function typeText(){
  let box=document.getElementById("wish");
  box.innerHTML="";
  let t=setInterval(()=>{
    box.innerHTML+=text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(t);
  },65);
}

/* PHOTO */
let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];

setInterval(()=>{
  let img=document.getElementById("photo");
  if(!img) return;
  img.src=photos[Math.floor(Math.random()*photos.length)];
},3000);

/* START */
function start(){

  boom.pause();
  boom.currentTime=0;

  show("countScreen");

  let c=5;

  let t=setInterval(()=>{
    c--;
    document.getElementById("count").innerText=c;

    if(c===0){
      clearInterval(t);

      music.loop=true;
      music.play(); // 🎧 START MAKHMALI HERE

      show("readyScreen");

      startRoamButton();
    }
  },1000);
}

/* YES BUTTON ROAM (5 sec) */
function startRoamButton(){

  let btn=document.getElementById("yesBtn");

  btn.classList.add("roaming");

  setTimeout(()=>{

    btn.classList.remove("roaming");

  },5000);
}

/* NEXT */
function goNext(){

  show("waitScreen");

  setTimeout(()=>{
    showProposal();
  },3000);

}

/* PROPOSAL */
function showProposal(){

  show("proposal");

  let img=document.getElementById("proposalImg");

  setTimeout(()=>{
    img.style.opacity="1";
    img.style.transform="translateY(0) scale(1)";
  },500);

}

</script>

</body>
</html>
